<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Text Scanner AR</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>Text Scanner</h1>
      <p class="subtitle">Point the camera at text. Detecting <strong>Kg</strong> opens Google.</p>
    </header>

    <section class="camera-wrap">
      <video id="video" playsinline muted autoplay></video>
      <canvas id="overlay" aria-hidden="true"></canvas>
      <div id="status" class="status status--idle">Tap Start to open the camera</div>
    </section>

    <section class="controls">
      <button id="startBtn" type="button" class="btn btn--primary">Start camera</button>
      <button id="stopBtn" type="button" class="btn btn--secondary" disabled>Stop</button>
    </section>

    <section class="detected">
      <h2>Last scan</h2>
      <pre id="ocrText" class="ocr-text">—</pre>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="js/app.js" type="module"></script>
</body>
</html>
