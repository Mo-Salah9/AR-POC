<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f1419" />
    <title>كشف النص — الرياضيات</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>كشف النص بالكاميرا</h1>
        <p class="hint">
          عند رصد <strong>الرياضيات</strong> يُفتح
          <a href="https://www.google.com" target="_blank" rel="noopener">Google</a>
        </p>
      </header>

      <div class="camera-wrap">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas" hidden></canvas>
        <div id="overlay" class="overlay" aria-hidden="true"></div>
        <div id="loader" class="loader hidden">
          <span class="loader-spinner"></span>
          <span>تحميل OCR…</span>
        </div>
      </div>

      <section class="status-panel">
        <p id="status" class="status">جاري التحميل…</p>
        <p id="detected" class="detected"></p>
        <a
          id="open-link"
          class="open-link hidden"
          href="https://www.google.com"
          target="_blank"
          rel="noopener noreferrer"
        >
          فتح Google
        </a>
      </section>

      <footer class="footer">
        <a href="test-card.html">بطاقة اختبار</a>
        ·
        <span>الكاميرا تبدأ تلقائيًا</span>
      </footer>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="js/app.js" type="module"></script>
  </body>
</html>
