<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>بطاقة اختبار — الرياضيات</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: system-ui, "Segoe UI", Tahoma, sans-serif;
        background: #fff;
        padding: 2rem;
      }
      h1 {
        font-size: clamp(3rem, 18vw, 8rem);
        margin: 0;
        color: #111;
        letter-spacing: 0.02em;
      }
      p {
        margin-top: 2rem;
        color: #555;
        text-align: center;
        max-width: 28rem;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <h1>الرياضيات</h1>
    <p>
      افتح <strong>http://localhost:3000</strong> على جهاز آخر أو نافذة أخرى، واسمح
      بالكاميرا، ثم وجّه الكاميرا نحو هذه الكلمة.
    </p>
  </body>
</html>
